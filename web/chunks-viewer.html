<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>向量片段查看器</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #333; margin-bottom: 20px; }
        .selector { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .selector label { font-weight: 500; margin-right: 10px; }
        .selector select { padding: 10px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; min-width: 250px; }
        .stats { display: flex; gap: 20px; margin-top: 15px; }
        .stat-box { background: #e8f4fd; padding: 12px 20px; border-radius: 8px; }
        .stat-box.qa { background: #fff3e0; }
        .stat-box strong { font-size: 24px; color: #4a90d9; }
        .stat-box.qa strong { color: #e65100; }
        .section { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .section h2 { color: #333; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #eee; }
        .chunk-item, .qa-item { border: 1px solid #eee; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
        .chunk-item:hover, .qa-item:hover { border-color: #4a90d9; }
        .chunk-id, .qa-id { font-size: 12px; color: #999; margin-bottom: 8px; font-family: monospace; }
        .chunk-content, .qa-question { background: #f8f9fa; padding: 12px; border-radius: 6px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
        .metadata { margin-top: 10px; font-size: 12px; color: #666; }
        .metadata span { background: #eee; padding: 2px 8px; border-radius: 4px; margin-right: 8px; display: inline-block; margin-bottom: 4px; }
        .empty { text-align: center; padding: 40px; color: #999; }
        .loading { text-align: center; padding: 40px; color: #666; }
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; background: #eee; color: #666; }
        .tab.active { background: #4a90d9; color: white; }
        .tab:hover { background: #e0e0e0; }
        .tab.active:hover { background: #3a7bc8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 向量片段查看器</h1>

        <div class="selector">
            <label>选择机器人：</label>
            <select id="botSelect">
                <option value="">-- 请选择机器人 --</option>
            </select>
            <div class="stats" id="stats" style="display:none;">
                <div class="stat-box">
                    <strong id="kbCount">0</strong> 个 KB 片段
                </div>
                <div class="stat-box qa">
                    <strong id="qaCount">0</strong> 个 QA 对
                </div>
            </div>
        </div>

        <div id="content" style="display:none;">
            <div class="tabs">
                <button class="tab active" onclick="showTab('kb')">📖 知识库片段</button>
                <button class="tab" onclick="showTab('qa')">❓ QA 问答对</button>
            </div>

            <div class="section" id="kbSection">
                <h2>📖 知识库片段 (KB Chunks)</h2>
                <div id="kbList"></div>
            </div>

            <div class="section" id="qaSection" style="display:none;">
                <h2>❓ QA 问答对 (QA Embeddings)</h2>
                <div id="qaList"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        const TOKEN_KEY = 'admin_token';

        let currentBotId = null;
        let chunksData = null;

        // 获取token
        function getToken() {
            return localStorage.getItem(TOKEN_KEY);
        }

        // 加载机器人列表
        async function loadBots() {
            const token = getToken();
            if (!token) {
                alert('请先登录管理员账号');
                window.location.href = '/admin/login';
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/api/admin/bots`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401) {
                    alert('登录已过期，请重新登录');
                    window.location.href = '/admin/login';
                    return;
                }
                const bots = await res.json();
                const select = document.getElementById('botSelect');
                bots.forEach(bot => {
                    const opt = document.createElement('option');
                    opt.value = bot.id;
                    opt.textContent = `${bot.name} (${bot.industry_type})`;
                    select.appendChild(opt);
                });
            } catch (e) {
                console.error('加载机器人失败:', e);
                alert('加载机器人失败: ' + e.message);
            }
        }

        // 加载chunks数据
        async function loadChunks(botId) {
            if (!botId) {
                document.getElementById('content').style.display = 'none';
                document.getElementById('stats').style.display = 'none';
                return;
            }

            currentBotId = botId;
            const token = getToken();

            document.getElementById('content').style.display = 'block';
            document.getElementById('stats').style.display = 'flex';
            document.getElementById('kbList').innerHTML = '<div class="loading">加载中...</div>';
            document.getElementById('qaList').innerHTML = '<div class="loading">加载中...</div>';

            try {
                const res = await fetch(`${API_BASE}/api/admin/chunks/${botId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('加载失败');
                chunksData = await res.json();

                document.getElementById('kbCount').textContent = chunksData.kb_chunks.count;
                document.getElementById('qaCount').textContent = chunksData.qa_embeddings.count;

                renderKB(chunksData.kb_chunks);
                renderQA(chunksData.qa_embeddings);
            } catch (e) {
                console.error('加载chunks失败:', e);
                document.getElementById('kbList').innerHTML = '<div class="empty">加载失败: ' + e.message + '</div>';
                document.getElementById('qaList').innerHTML = '<div class="empty">加载失败: ' + e.message + '</div>';
            }
        }

        // 渲染KB片段
        function renderKB(data) {
            const container = document.getElementById('kbList');
            if (!data.items || data.items.length === 0) {
                container.innerHTML = '<div class="empty">暂无知识库片段，请先上传文档</div>';
                return;
            }

            container.innerHTML = data.items.map(item => `
                <div class="chunk-item">
                    <div class="chunk-id">ID: ${escapeHtml(item.id)}</div>
                    <div class="chunk-content">${escapeHtml(item.content)}</div>
                    <div class="metadata">
                        ${formatMetadata(item.metadata)}
                    </div>
                </div>
            `).join('');
        }

        // 渲染QA对
        function renderQA(data) {
            const container = document.getElementById('qaList');
            if (!data.items || data.items.length === 0) {
                container.innerHTML = '<div class="empty">暂无QA问答对，请先添加QA</div>';
                return;
            }

            container.innerHTML = data.items.map(item => `
                <div class="qa-item">
                    <div class="qa-id">ID: ${escapeHtml(item.id)}</div>
                    <div class="chunk-content">${escapeHtml(item.question)}</div>
                    ${item.metadata.answer ? `<div style="margin-top:8px;padding:8px;background:#e8f5e9;border-radius:4px;"><strong>答案：</strong>${escapeHtml(item.metadata.answer)}</div>` : ''}
                    <div class="metadata">
                        ${formatMetadata(item.metadata)}
                    </div>
                </div>
            `).join('');
        }

        // 格式化metadata
        function formatMetadata(meta) {
            if (!meta) return '';
            const parts = [];
            if (meta.document_id) parts.push(`<span>文档ID: ${escapeHtml(meta.document_id)}</span>`);
            if (meta.chunk_index !== undefined) parts.push(`<span>块索引: ${meta.chunk_index}</span>`);
            if (meta.qa_id) parts.push(`<span>QA ID: ${escapeHtml(meta.qa_id)}</span>`);
            if (meta.category) parts.push(`<span>分类: ${escapeHtml(meta.category)}</span>`);
            if (meta.keywords) parts.push(`<span>关键词: ${escapeHtml(meta.keywords)}</span>`);
            return parts.join('');
        }

        // HTML转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 切换标签
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('kbSection').style.display = tab === 'kb' ? 'block' : 'none';
            document.getElementById('qaSection').style.display = tab === 'qa' ? 'block' : 'none';
        }

        // 事件监听
        document.getElementById('botSelect').addEventListener('change', (e) => {
            loadChunks(e.target.value);
        });

        // 初始化
        loadBots();
    </script>
</body>
</html>
